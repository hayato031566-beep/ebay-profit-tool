<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay利益で、デルベイ！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main--l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:      #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:      #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:    #1a9e5c;
      --green-l: #e4f7ee;
      --red:      #d03a3a;
      --red-l:    #fceaea;
      --dollar-bg:  #edf7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:      #fef6ea;
      --yen-bd:      #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px;
      --r-sm: 10px;
      --r-xs:  6px;
      --r-lg: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      padding: 13px 18px 11px;
      display: flex; align-items: center; gap: 11px;
      position: sticky; top: 0; z-index: 100;
    }
    .hd-logo {
      width: 32px; height: 32px; background: var(--main);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hd-logo svg { display: block; }
    .hd-text { flex: 1; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.025em; line-height: 1.15; }
    .hd-name span { color: var(--main); }
    .hd-sub   { font-size: 9.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .hd-rate {
      font-size: 11px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 18px;
    }
    .tab {
      flex: 1; padding: 12px 0 11px; text-align: center;
      color: rgba(255,255,255,0.35); cursor: pointer;
      font-size: 14px; font-weight: 400;
      border-bottom: 3px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #fff; border-bottom-color: var(--main); font-weight: 600; }

    /* ── Layout ── */
    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 18px 14px 80px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Result box ── */
    .result-box {
      background: var(--ink); color: #fff;
      border-radius: var(--r-lg); padding: 22px 20px 20px;
      text-align: center; margin-bottom: 18px;
      position: relative; overflow: hidden;
    }
    .result-box::after {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,89,58,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .res-row {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }
    .res-row span b { color: #fff; font-weight: 500; }

    #profit {
      font-size: 52px; font-weight: 300; letter-spacing: -0.05em;
      line-height: 1; margin: 4px 0 6px;
      transition: color 0.3s;
    }
    .profit-rate-row { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.03em; margin-bottom: 20px; }
    .profit-rate-row b { color: #fff; font-weight: 500; }

    .res-actions { display: flex; gap: 10px; position: relative; z-index: 1; }
    .btn-save {
      flex: 2; padding: 16px; background: var(--main); color: #fff; border: none;
      border-radius: var(--r-sm); font-weight: 700; font-size: 16px;
      font-family: 'Inter', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s;
    }
    .btn-save:active { transform: scale(0.96); background: #8c3c22; }
    .btn-reset-top {
      flex: 1; padding: 16px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--r-sm); font-weight: 500; font-size: 14px;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
    }

    .card {
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden;
    }
    h2 {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3);
      margin: 0; padding: 15px 20px 0;
      display: flex; align-items: center; gap: 7px;
    }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; }

    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 15px; padding: 15px 20px 20px;
    }
    .field { display: flex; flex-direction: column; position: relative; }
    .field.full { grid-column: 1 / 3; }

    label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 8px;
    }

    .iw { display: flex; align-items: stretch; position: relative; }
    .cb {
      display: flex; align-items: center; justify-content: center;
      min-width: 50px; padding: 0 12px; font-size: 18px; font-weight: 700;
      border-radius: var(--r-sm) 0 0 var(--r-sm); border: 1px solid; border-right: none;
      flex-shrink: 0;
    }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.y { background: var(--yen-bg);    border-color: var(--yen-bd);    color: var(--yen-txt); }
    .cb.p { background: var(--bg2);         border-color: var(--border);    color: var(--ink3); font-size: 15px; }

    input, select {
      padding: 14px 16px; border: 1px solid #d1d1d1; border-radius: var(--r-sm);
      font-size: 16px; font-family: 'Inter', sans-serif; background: var(--bg); width: 100%;
      min-height: 54px; -webkit-appearance: none;
    }
    .iw input { border-radius: 0 var(--r-sm) var(--r-sm) 0; border-left: none; flex: 1; }
    input:focus, select:focus { border-color: var(--main); background: var(--surface); box-shadow: 0 0 0 4px rgba(192,89,58,0.12); }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    .quick-group { display: flex; gap: 8px; margin-top: 10px; }
    .q-btn {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      padding: 12px 6px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; color: var(--ink2);
      cursor: pointer; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .q-btn small { font-size: 10px; font-weight: 400; opacity: 0.6; }

    .btn-toggle {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: calc(100% - 40px); margin: 0 20px 16px; padding: 14px; background: var(--bg2);
      border: 1px dashed var(--border); border-radius: var(--r-sm); font-size: 13px; font-weight: 500; color: var(--ink2);
      cursor: pointer; min-height: 50px;
    }
    #backCalcPanel { display: none; background: var(--main-l); border: 1px solid rgba(192,89,58,0.20); padding: 18px 20px; }
    #backCalcPanel button {
      background: var(--main); color: #fff; border: none; border-radius: var(--r-sm); padding: 0 20px;
      font-size: 15px; font-weight: 600; cursor: pointer; min-height: 54px;
    }

    .report-hero {
      background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 24px 20px; margin-bottom: 12px; position: relative;
    }
    #monthTotal { font-size: 48px; font-weight: 300; letter-spacing: -0.04em; color: #fff; text-align: center; margin: 6px 0 15px; }
    .goal-meta { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 10px; }
    .bar-bg { background: rgba(255,255,255,0.10); height: 12px; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, #e8593c 0%, #f5a623 60%, #2ecc71 100%); background-size: 200% 100%; transition: width 0.7s ease; }

    .sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0 0; }
    .sum-item { background: var(--surface); padding: 16px 12px; border-radius: var(--r); text-align: center; border: 1.5px solid var(--border); }
    .sum-item.active-filter { border-color: var(--main); background: var(--main-l); }
    .sum-item b { font-size: 32px; font-weight: 300; display: block; }

    .hist-card { background: var(--surface); padding: 15px 16px; border-radius: var(--r-sm); margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .hist-del { color: var(--red); background: none; border: none; font-size: 24px; cursor: pointer; padding: 0 10px; }

    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 12px 24px; border-radius: 25px; font-size: 14px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

    /* ── Month Selector Styles ── */
    .month-selector-wrap { padding: 0 20px 15px; }
    .month-selector-wrap label { display: block; margin-bottom: 6px; }
    select.month-select { 
        background-color: rgba(255,255,255,0.05); 
        border-color: rgba(255,255,255,0.1); 
        color: #fff;
        height: 44px;
        min-height: 44px;
        font-size: 14px;
        padding: 0 12px;
    }
    select.month-select option { background-color: var(--ink); color: #fff; }

    @media (max-width: 360px) { #profit { font-size: 42px; } #monthTotal { font-size: 38px; } }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <div class="hd-text">
    <div class="hd-name">eBay利益で、<span>デルベイ！</span></div>
    <div class="hd-sub">eBay輸出 利益計算ツール</div>
  </div>
  <div class="hd-rate"><div class="hd-dot"></div><span id="rateDisplay">¥150/$</span></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">利益計算</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">集計レポート</div>
</div>

<div class="container">

  <div id="calcPage" class="page active">
    <div class="card">
      <h2>商品メモ</h2>
      <div class="form-grid" style="padding-top:10px;">
        <div class="field full">
          <input type="text" id="itemName" placeholder="例: Game Console / Anime Figure">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>取引情報を入力</h2>
      <div class="form-grid">
        <div class="field">
          <label>為替レート</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div>
        </div>
        <div class="field">
          <label>eBay手数料</label>
          <div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15"></div>
        </div>
        <div class="field">
          <label>売値 ($)</label>
          <div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd" placeholder="0.00"></div>
        </div>
        <div class="field">
          <label>仕入れ (￥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="cost" placeholder="0"></div>
        </div>
        <div class="field">
          <label>国際送料 (￥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="shipping" placeholder="0"></div>
          <div class="quick-group">
            <button class="q-btn" onclick="setShipping(3000)">✈ FedEx<small>¥3,000</small></button>
            <button class="q-btn" onclick="setShipping(5000)">📦 EMS<small>¥5,000</small></button>
          </div>
        </div>
        <div class="field">
          <label>経費・雑費 (￥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div>
        </div>
      </div>

      <button class="btn-toggle" onclick="toggleBackCalc()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 010 12h-1"/></svg>
        【逆算】目標から売値を出す
      </button>
      <div id="backCalcPanel">
        <label>目標の純利益 (円)</label>
        <div style="display:flex; gap:10px; margin-top:8px; position:relative;">
          <input type="number" id="targetProfit" value="3000">
          <button onclick="calcBack()">計算</button>
        </div>
      </div>
    </div>

    <div class="result-box">
      <div class="res-row">
        <span>売上: <b id="salesJpy">¥0</b></span>
        <span>手数料: <b id="feeJpy">¥0</b></span>
      </div>
      <div id="profit">¥0</div>
      <div class="profit-rate-row">利益率: <b id="profitRate">0.0%</b></div>
      
      <div class="res-actions">
        <button class="btn-save" onclick="saveRecord()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          利益を記録
        </button>
        <button class="btn-reset-top" onclick="resetInputs()">リセット</button>
      </div>
    </div>
  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <h2 style="color:rgba(255,255,255,0.35); padding:0 0 15px; display:flex; justify-content:space-between; align-items:center;">
        📈 進捗レポート
        <div style="display:flex; gap:8px;">
          <button class="q-btn" style="min-height:unset; padding:6px 12px; background:rgba(255,255,255,0.1); color:#fff; border:none;" onclick="setGoal()">目標設定</button>
          <button class="q-btn" style="min-height:unset; padding:6px 12px; background:#000; color:#fff; border:none;" onclick="shareOnX()">𝕏 シェア</button>
        </div>
      </h2>

      <div class="month-selector-wrap">
        <label style="color:rgba(255,255,255,0.5); font-size:10px;">表示月を選択</label>
        <select id="monthFilter" class="month-select" onchange="updateReport('all')">
          </select>
      </div>

      <div class="goal-meta"><span id="goalText">目標: ¥100,000</span><span id="percentText">0%</span></div>
      <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
      <div id="monthTotal" onclick="updateReport('all')">¥0</div>
    </div>

    <div class="card" style="padding:16px;">
      <div class="sum-grid">
        <div class="sum-item" id="filter-plus" onclick="updateReport('plus')">
          <div style="color:var(--green); font-size:10px; font-weight:700;">黒字件数</div>
          <b id="plusCount" style="color:var(--green);">0</b>
        </div>
        <div class="sum-item" id="filter-minus" onclick="updateReport('minus')">
          <div style="color:var(--red); font-size:10px; font-weight:700;">赤字件数</div>
          <b id="minusCount" style="color:var(--red);">0</b>
        </div>
      </div>
    </div>
    <div id="historyList"></div>
    <button onclick="saveCSV()" style="width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--ink2); font-size:14px; font-weight:600; margin-top:30px; padding: 15px; cursor: pointer;">CSVをダウンロード</button>
    <button onclick="clearAllData()" style="width:100%; background:none; border:none; color:var(--red); font-size:13px; opacity:0.5; padding: 20px;">データを全削除</button>
  </div>

</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));
  let currentFilter = 'all';

  window.onload = () => {
    inputs.rate.value = localStorage.getItem('cfg_rate') || 150;
    inputs.feePercent.value = localStorage.getItem('cfg_fee') || 15;
    initMonthSelector();
    updateReport();
  };

  function switchTab(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    document.getElementById(pId === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
    if(pId === 'reportPage') {
      initMonthSelector(); // 切り替え時にプルダウンを最新に更新
      updateReport('all');
    }
  }

  // 月選択プルダウンの初期化
  function initMonthSelector() {
    const selector = document.getElementById('monthFilter');
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    
    // 現在の年月をデフォルト用に取得
    const now = new Date();
    const currentYM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    
    // データ内にある年月を抽出
    const months = data.map(item => {
      const d = new Date(item.date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    });
    
    // 現在の年月を必ず含め、重複を排除してソート
    months.push(currentYM);
    const uniqueMonths = Array.from(new Set(months)).sort().reverse();

    const prevValue = selector.value;
    selector.innerHTML = '';
    uniqueMonths.forEach(ym => {
      const [y, m] = ym.split('-');
      const opt = document.createElement('option');
      opt.value = ym;
      opt.textContent = `${y}年${parseInt(m)}月`;
      selector.appendChild(opt);
    });

    // 以前の選択があれば維持、なければ最新月
    if (prevValue && uniqueMonths.includes(prevValue)) {
      selector.value = prevValue;
    } else {
      selector.value = uniqueMonths[0];
    }
  }

  function setShipping(v) { inputs.shipping.value = v; calc(); }
  
  function toggleBackCalc() { 
    const p = document.getElementById('backCalcPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
  }

  function calc() {
    const val = (id) => parseFloat(inputs[id].value) || 0;
    localStorage.setItem('cfg_rate', inputs.rate.value);
    localStorage.setItem('cfg_fee', inputs.feePercent.value);

    const fmt = new Intl.NumberFormat(undefined, { style: 'currency', currency: 'JPY' }).format;

    const sJpy = Math.round(val('saleUsd') * val('rate'));
    const fJpy = Math.round(sJpy * (val('feePercent') / 100));
    const profit = sJpy - (val('cost') + val('shipping') + val('other') + fJpy);
    const pRate = sJpy > 0 ? (profit / sJpy) * 100 : 0;

    document.getElementById('salesJpy').textContent = fmt(sJpy);
    document.getElementById('feeJpy').textContent = fmt(fJpy);
    
    const pEl = document.getElementById('profit');
    pEl.textContent = fmt(profit);
    pEl.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('profitRate').textContent = pRate.toFixed(1) + '%';
    document.getElementById('rateDisplay').textContent = '¥' + (val('rate') || 150) + '/$';
  }
  ids.forEach(id => inputs[id].addEventListener('input', calc));

  function calcBack() {
    const target = parseFloat(document.getElementById('targetProfit').value) || 0;
    const val = (id) => parseFloat(inputs[id].value) || 0;
    const rate = val('rate');
    const fP = val('feePercent') / 100;
    if(rate <= 0) return;
    const res = (target + val('cost') + val('shipping') + val('other')) / (rate * (1 - fP));
    inputs.saleUsd.value = Math.ceil(res);
    calc();
    showToast('売値を更新しました');
  }

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('売値を入力してください');
    const pText = document.getElementById('profit').textContent.replace(/[^0-9.-]/g, '');
    const profit = parseInt(pText);
    const record = { id: Date.now(), name: inputs.itemName.value || '無題', sale: inputs.saleUsd.value, profit: profit, date: new Date().toISOString() };
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift(record);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('保存しました！');
  }

  function updateReport(filter = currentFilter) {
    currentFilter = filter;
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const goal = parseInt(localStorage.getItem('cfg_goal') || 100000);
    const selectedYM = document.getElementById('monthFilter').value;
    const fmt = new Intl.NumberFormat(undefined, { style: 'currency', currency: 'JPY' }).format;
    
    let mSum = 0, pCount = 0, mCount = 0;
    const listEl = document.getElementById('historyList');
    listEl.innerHTML = '';

    document.getElementById('filter-plus').classList.remove('active-filter');
    document.getElementById('filter-minus').classList.remove('active-filter');
    if(currentFilter === 'plus') document.getElementById('filter-plus').classList.add('active-filter');
    if(currentFilter === 'minus') document.getElementById('filter-minus').classList.add('active-filter');

    data.forEach(item => {
      const itemDate = new Date(item.date);
      const itemYM = `${itemDate.getFullYear()}-${String(itemDate.getMonth() + 1).padStart(2, '0')}`;
      
      // 選択された月のみ集計対象にする
      if (itemYM === selectedYM) {
        mSum += item.profit;
        if(item.profit >= 0) pCount++; else mCount++;
        
        let show = (currentFilter === 'all') || (currentFilter === 'plus' && item.profit >= 0) || (currentFilter === 'minus' && item.profit < 0);
        if(show) {
          const div = document.createElement('div');
          div.className = 'hist-card';
          div.innerHTML = `<div><b style="font-size:16px;">${item.name}</b><br><small>$${item.sale}</small></div>
                           <div style="display:flex;align-items:center;"><b style="font-size:18px; color:${item.profit>=0?'var(--green)':'var(--red)'}">${fmt(item.profit)}</b>
                           <button class="hist-del" onclick="deleteItem(${item.id})">×</button></div>`;
          listEl.appendChild(div);
        }
      }
    });
    document.getElementById('monthTotal').textContent = fmt(mSum);
    document.getElementById('plusCount').textContent = pCount;
    document.getElementById('minusCount').textContent = mCount;
    document.getElementById('goalText').textContent = '目標: ' + fmt(goal);
    const per = Math.min(100, Math.max(0, Math.round((mSum / goal) * 100)));
    document.getElementById('goalBar').style.width = per + '%';
    document.getElementById('percentText').textContent = per + '%';
  }

  function deleteItem(id) {
    if(!confirm('削除しますか？')) return;
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data = data.filter(i => i.id !== id);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    initMonthSelector(); // データ削除後に月リストも更新
    updateReport(currentFilter); 
  }

  function resetInputs() {
    ['itemName', 'saleUsd', 'cost', 'shipping', 'other'].forEach(id => {
      inputs[id].value = (id === 'other' ? 0 : '');
    });
    calc();
    showToast('入力をリセットしました');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function shareOnX() {
    const total = document.getElementById('monthTotal').textContent;
    const text = encodeURIComponent(`今月のeBay輸出利益は ${total}！ #デルベイ`);
    window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
  }

  function setGoal() {
    const g = prompt('目標利益を入力', '100000');
    if(g) { localStorage.setItem('cfg_goal', g); updateReport(); }
  }

  function clearAllData() { if(confirm('全データを削除しますか？')) { localStorage.removeItem('ebay_pro_data'); initMonthSelector(); updateReport(); } }

  function saveCSV() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    if(data.length === 0) return showToast('保存データがありません');
    
    let csv = "\uFEFF日付,商品名,売上($),利益(円)\n";
    data.forEach(item => {
      const d = new Date(item.date).toLocaleDateString('ja-JP');
      csv += `${d},"${item.name}",${item.sale},${item.profit}\n`;
    });
    
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `ebay_profit_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    showToast('CSVをダウンロードしました');
  }
</script>
</body>
</html>
